function useInView(threshold = 0.12) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.unobserve(el); } }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function Reveal({ children, delay = 0, style = {} }) {
  const [ref, visible] = useInView();
  return (<div ref={ref} style={{ ...style, opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(48px)", transition: `opacity 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s` }}>{children}</div>);
}

function Marquee({ text, speed = 30 }) {
  return (<div style={{ overflow: "hidden", whiteSpace: "nowrap", padding: "20px 0", borderTop: `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}` }}>
    <div style={{ display: "inline-block", animation: `marquee ${speed}s linear infinite` }}>
      {Array(6).fill(null).map((_, i) => (<span key={i} style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "clamp(14px, 2vw, 18px)", color: C.sectionNum, letterSpacing: "4px", textTransform: "uppercase", marginRight: 64 }}>{text} <span style={{ color: C.teal }}>●</span>{" "}</span>))}
    </div>
  </div>);
}

function SectionLabel({ num, label }) {
  return (<Reveal><div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 64 }}>
    <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: C.sectionNum, letterSpacing: "3px", textTransform: "uppercase" }}>{num}</span>
    <div style={{ width: 40, height: 1, background: C.sectionLine }} />
    <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: C.sectionNum, letterSpacing: "3px", textTransform: "uppercase" }}>{label}</span>
  </div></Reveal>);
}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);
  useEffect(() => { const h = () => setScrolled(window.scrollY > 80); window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h); }, []);
  const go = (id) => { document.getElementById(id)?.scrollIntoView({ behavior: "smooth" }); setOpen(false); };
  const links = ["manifesto", "what-we-do", "community", "join"];
  return (
    <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: scrolled ? "rgba(17,13,36,0.96)" : "transparent", backdropFilter: scrolled ? "blur(16px)" : "none", transition: "all 0.4s" }}>
      <div style={{ maxWidth: 1400, margin: "0 auto", padding: "0 clamp(20px,4vw,48px)", height: 72, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div onClick={() => go("hero")} style={{ cursor: "pointer", display: "flex", alignItems: "center", gap: 8 }}>
          <img src={PICTO} alt="" style={{ height: 40, width: 40, objectFit: "contain", borderRadius: "50%" }} />
          <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, color: "#fff", letterSpacing: "3px" }}>IOKELA</span>
        </div>
        <div className="nav-links" style={{ display: "flex", gap: 36, alignItems: "center" }}>
          {links.map(l => (<button key={l} onClick={() => go(l)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Space Mono', monospace", fontSize: 12, color: C.textBody, letterSpacing: "2px", textTransform: "uppercase", transition: "color 0.3s", padding: 0 }}
            onMouseEnter={e => e.target.style.color = C.teal} onMouseLeave={e => e.target.style.color = C.textBody}>{l.replace("-", " ")}</button>))}
        </div>
        <button className="mobile-burger" onClick={() => setOpen(!open)} style={{ display: "none", background: "none", border: "none", cursor: "pointer", padding: 8 }}>
          <div style={{ width: 28, height: 2, background: "#fff", marginBottom: 7, transition: "0.3s", transform: open ? "rotate(45deg) translateY(9px)" : "none" }} />
          <div style={{ width: 28, height: 2, background: "#fff", marginBottom: 7, opacity: open ? 0 : 1, transition: "0.3s" }} />
          <div style={{ width: 28, height: 2, background: "#fff", transition: "0.3s", transform: open ? "rotate(-45deg) translateY(-9px)" : "none" }} />
        </button>
      </div>

  );
