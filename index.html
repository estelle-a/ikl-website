const C={indigo:"#2C1F55",blue:"#1B1B87",teal:"#0EC6D6",gold:"#ECBA53",lavender:"#EEEAF5",bg:"#110D24",bgCard:"rgba(27,27,135,0.08)",bgCardHover:"rgba(27,27,135,0.14)",border:"rgba(44,31,85,0.25)",textBody:"#B0ABBD",textMuted:"#8B859C",sectionNum:"#8B859C",sectionLine:"rgba(44,31,85,0.5)"};
const FB="'Luciole',Verdana,sans-serif";
const FD="'Bebas Neue',sans-serif";

function useInView(t=0.12){const r=useRef(null);const[v,s]=useState(false);useEffect(()=>{const e=r.current;if(!e)return;const o=new IntersectionObserver(([x])=>{if(x.isIntersecting){s(true);o.unobserve(e)}},{threshold:t});o.observe(e);return()=>o.disconnect()},[t]);return[r,v]}
function Reveal({children,delay=0,style={}}){const[r,v]=useInView();return(<div ref={r} style={{...style,opacity:v?1:0,transform:v?"translateY(0)":"translateY(48px)",transition:`opacity 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s, transform 0.8s cubic-bezier(0.16,1,0.3,1) ${delay}s`}}>{children}</div>)}
function Marquee({text,speed=30}){return(<div style={{overflow:"hidden",whiteSpace:"nowrap",padding:"20px 0",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}} aria-hidden="true"><div style={{display:"inline-block",animation:`marquee ${speed}s linear infinite`}}>{Array(6).fill(null).map((_,i)=>(<span key={i} style={{fontFamily:FB,fontSize:"clamp(14px,2vw,18px)",fontWeight:700,color:C.sectionNum,letterSpacing:"3px",textTransform:"uppercase",marginRight:64}}>{text} <span style={{color:C.teal}}>●</span>{" "}</span>))}</div></div>)}
function SectionLabel({num,label}){return(<Reveal><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:64}}><span style={{fontFamily:FB,fontSize:13,fontWeight:700,color:C.sectionNum,letterSpacing:"3px",textTransform:"uppercase"}}>{num}</span><div style={{width:40,height:1,background:C.sectionLine}} aria-hidden="true"/><span style={{fontFamily:FB,fontSize:13,fontWeight:700,color:C.sectionNum,letterSpacing:"3px",textTransform:"uppercase"}}>{label}</span></div></Reveal>)}

function Nav(){const[scrolled,setScrolled]=useState(false);const[open,setOpen]=useState(false);useEffect(()=>{const h=()=>setScrolled(window.scrollY>80);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h)},[]);const go=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"});setOpen(false)};const links=["manifesto","what-we-do","community","join"];return(
<nav aria-label="Main navigation" style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:scrolled?"rgba(17,13,36,0.96)":"transparent",backdropFilter:scrolled?"blur(16px)":"none",transition:"all 0.4s"}}>
<div style={{maxWidth:1400,margin:"0 auto",padding:"0 clamp(20px,4vw,48px)",height:72,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<a href="#hero" onClick={e=>{e.preventDefault();go("hero")}} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8,textDecoration:"none"}} aria-label="IOKELA home">
<img src={PICTO} alt="" style={{height:40,width:40,objectFit:"contain",borderRadius:"50%"}}/>
<span style={{fontFamily:FD,fontSize:26,color:"#fff",letterSpacing:"3px"}}>IOKELA</span></a>
<div className="nav-links" style={{display:"flex",gap:36,alignItems:"center"}}>{links.map(l=>(<button key={l} onClick={()=>go(l)} style={{background:"none",border:"none",cursor:"pointer",fontFamily:FB,fontSize:14,fontWeight:700,color:C.textBody,letterSpacing:"2px",textTransform:"uppercase",transition:"color 0.3s",padding:"4px 0"}} onMouseEnter={e=>e.target.style.color=C.teal} onMouseLeave={e=>e.target.style.color=C.textBody}>{l.replace("-"," ")}</button>))}</div>
<button className="mobile-burger" onClick={()=>setOpen(!open)} aria-label={open?"Close menu":"Open menu"} aria-expanded={open} style={{display:"none",background:"none",border:"none",cursor:"pointer",padding:8}}>
<div style={{width:28,height:2,background:"#fff",marginBottom:7,transition:"0.3s",transform:open?"rotate(45deg) translateY(9px)":"none"}}/><div style={{width:28,height:2,background:"#fff",marginBottom:7,opacity:open?0:1,transition:"0.3s"}}/><div style={{width:28,height:2,background:"#fff",transition:"0.3s",transform:open?"rotate(-45deg) translateY(-9px)":"none"}}/></button></div>
{open&&<div style={{background:C.bg,padding:"24px clamp(20px,4vw,48px) 32px",display:"flex",flexDirection:"column",gap:24,borderBottom:`1px solid ${C.border}`}}>{links.map(l=><button key={l} onClick={()=>go(l)} style={{background:"none",border:"none",textAlign:"left",fontFamily:FD,fontSize:28,color:"#fff",cursor:"pointer",textTransform:"uppercase",letterSpacing:"2px"}}>{l.replace("-"," ")}</button>)}</div>}
</nav>)}

function Hero(){const[loaded,setLoaded]=useState(false);useEffect(()=>{setTimeout(()=>setLoaded(true),100)},[]);return(
<section id="hero" aria-label="Hero" style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.bg} 0%,${C.blue} 50%,${C.indigo} 100%)`,display:"flex",flexDirection:"column",justifyContent:"center",position:"relative",overflow:"hidden",padding:"120px clamp(20px,4vw,48px) 80px"}}>
<div style={{position:"absolute",inset:0,opacity:0.04,pointerEvents:"none",backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`}} aria-hidden="true"/>
<div style={{position:"absolute",top:"-20vh",right:"-10vw",width:"clamp(300px,50vw,600px)",height:"clamp(300px,50vw,600px)",borderRadius:"50%",background:"radial-gradient(circle,rgba(14,198,214,0.07) 0%,transparent 70%)",animation:"pulse-slow 6s ease-in-out infinite"}} aria-hidden="true"/>
<div style={{maxWidth:1400,margin:"0 auto",width:"100%",position:"relative",zIndex:2}}>
<div style={{opacity:loaded?1:0,transform:loaded?"translateY(0)":"translateY(20px)",transition:"all 0.6s ease 0.2s",marginBottom:32,display:"flex",alignItems:"center",gap:12}}>
